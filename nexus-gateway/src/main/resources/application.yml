server:
  port: 8080

spring:
  application:
    name: nexus-gateway
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
  # Nacos 服务发现 (本地开发时禁用)
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

    # Sentinel 限流
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${SENTINEL_PORT:8719}
      eager: true
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"msg":"请求过于频繁，请稍后重试"}'

    # Spring Cloud Gateway 路由配置（lb:// 服务发现路由）
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      discovery:
        locator:
          enabled: true         # 启用服务发现路由
          lower-case-service-id: true
      routes:
        # Java 微服务（通过 Nacos lb:// 路由）
        - id: nexus-auth
          uri: lb://nexus-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: nexus-tenant
          uri: lb://nexus-tenant
          predicates:
            - Path=/api/tenant/**
          filters:
            - StripPrefix=0

        - id: nexus-session
          uri: http://127.0.0.1:8004
          predicates:
            - Path=/api/session/**
          filters:
            - StripPrefix=0

        - id: nexus-platform
          uri: lb://nexus-platform
          predicates:
            - Path=/api/platform/**
          filters:
            - StripPrefix=0

        - id: nexus-agent-config
          uri: lb://nexus-agent-config
          predicates:
            - Path=/api/agent-config/**
          filters:
            - StripPrefix=0

        - id: nexus-knowledge
          uri: lb://nexus-knowledge
          predicates:
            - Path=/api/knowledge/**
          filters:
            - StripPrefix=0

        - id: nexus-billing
          uri: lb://nexus-billing
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=0

        # Python 微服务（直接 HTTP 路由，Nacos 未运行时使用）
        - id: nexus-agent-engine
          uri: http://127.0.0.1:8001
          predicates:
            - Path=/api/agent/**,/api/v1/agent/**,/api/v1/agents,/api/v1/agents/**,/api/v1/tenants/**,/api/v1/users/**
          filters:
            - StripPrefix=0
          metadata:
            response-timeout: 300000
            connect-timeout: 5000

        - id: nexus-llm-proxy
          uri: http://127.0.0.1:8010
          predicates:
            - Path=/api/llm/**
          filters:
            - StripPrefix=0

        - id: nexus-tool-registry
          uri: http://127.0.0.1:8012
          predicates:
            - Path=/api/tools/**
          filters:
            - StripPrefix=0

        - id: nexus-memory-service
          uri: http://127.0.0.1:8014
          predicates:
            - Path=/api/memory/**
          filters:
            - StripPrefix=0

        - id: nexus-rag-service
          uri: http://127.0.0.1:8013
          predicates:
            - Path=/api/rag/**
          filters:
            - StripPrefix=0

        - id: nexus-sandbox-service
          uri: http://127.0.0.1:8020
          predicates:
            - Path=/api/sandbox/**
          filters:
            - StripPrefix=0

# JWT 配置
nexus:
  jwt:
    secret: ${NEXUS_JWT_SECRET:nexus-auth-jwt-secret-key-must-be-at-least-32-characters-long}
    expiration-ms: 7200000
  gateway:
    white-list:
      - /api/auth/**
      - /api/v1/agents/**
      - /api/v1/agent/**
      - /api/session/**
      - /actuator/health
      - /actuator/info

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    tech.nexus.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    com.alibaba.cloud.sentinel: DEBUG
