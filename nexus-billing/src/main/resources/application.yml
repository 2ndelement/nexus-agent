server:
  port: 8008

spring:
  application:
    name: nexus-billing
  # Nacos 服务注册
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    # Sentinel 限流
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
        port: ${SENTINEL_PORT:8719}
      eager: true

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/nexus_agent}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:nexus}
    password: ${MYSQL_PASSWORD:nexus_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: tech.nexus.billing.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    tech.nexus: DEBUG
    com.baomidou.mybatisplus: WARN
