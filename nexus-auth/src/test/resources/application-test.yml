spring:
  datasource:
    url: jdbc:h2:mem:nexus_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
  data:
    redis:
      # 测试中 Redis 被 Mock，此处配置仅供 Spring 上下文初始化用
      host: 127.0.0.1
      port: 6379

nexus:
  jwt:
    secret: test-jwt-secret-key-for-nexus-auth-unit-testing-only
    access-token-expiration-ms: 7200000
    refresh-token-expiration-ms: 2592000000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
