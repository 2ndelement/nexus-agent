server:
  port: 8004

spring:
  application:
    name: nexus-session
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nexus_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: nexus
    password: nexus_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: tech.nexus.session.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input

logging:
  level:
    tech.nexus: DEBUG
    com.baomidou.mybatisplus: WARN
