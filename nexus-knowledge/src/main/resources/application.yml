server:
  port: 8007

spring:
  application:
    name: nexus-knowledge
  # Nacos 服务注册
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    # Sentinel 限流
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
        port: ${SENTINEL_PORT:8719}
      eager: true

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/nexus_agent}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:nexus}
    password: ${MYSQL_PASSWORD:nexus_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # RabbitMQ (通知 embed-worker 执行向量化)
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: tech.nexus.knowledge.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

nexus:
  knowledge:
    upload-dir: ${NEXUS_UPLOAD_DIR:/AstrBot/data/workspace/nexus-agent/data/uploads}
    embed-queue: nexus.embed.tasks

logging:
  level:
    tech.nexus: DEBUG
    com.baomidou.mybatisplus: WARN
