server:
  port: 8007

spring:
  application:
    name: nexus-knowledge
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/nexus_agent}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:nexus}
    password: ${MYSQL_PASSWORD:nexus_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: tech.nexus.knowledge.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

nexus:
  knowledge:
    upload-dir: /AstrBot/data/workspace/nexus-agent/data/uploads

logging:
  level:
    tech.nexus: DEBUG
    com.baomidou.mybatisplus: WARN

  # RabbitMQ (通知 embed-worker 执行向量化)
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

nexus:
  knowledge:
    upload-dir: ${NEXUS_UPLOAD_DIR:/data/uploads}
    embed-queue: nexus.embed.tasks
